<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumif.ai — Satguru SA Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #fff; }
  .gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .gate-box { text-align: center; max-width: 380px; padding: 48px 32px; }
  .gate-box::before { content: ''; display: block; width: 48px; height: 4px; background: linear-gradient(135deg, #E94D35, rgba(233,77,53,0.8)); border-radius: 2px; margin: 0 auto 28px; }
  .gate-box h2 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; color: #121212; }
  .gate-box p { font-size: 14px; color: #6B7280; margin-bottom: 28px; line-height: 1.6; }
  .gate-input { width: 100%; padding: 12px 16px; border: 1px solid #E5E7EB; border-radius: 10px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border 0.2s, box-shadow 0.2s; text-align: center; letter-spacing: 2px; }
  .gate-input:focus { border-color: #E94D35; box-shadow: 0 0 0 3px rgba(233,77,53,0.1); }
  .gate-input.error { border-color: #EF4444; animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .gate-btn { width: 100%; margin-top: 14px; padding: 12px; background: linear-gradient(135deg, #E94D35, rgba(233,77,53,0.9)); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: opacity 0.2s; }
  .gate-btn:hover { opacity: 0.9; }
  .gate-error-msg { display: none; color: #EF4444; font-size: 12px; margin-top: 10px; }
  .gate-hint { color: #9CA3AF; font-size: 11px; margin-top: 18px; }
</style>
</head>
<body>
<div class="gate">
  <div class="gate-box">
    <h2>Dashboard Access</h2>
    <p>This dashboard is password-protected.</p>
    <form id="gate-form">
      <input type="password" class="gate-input" id="pw" placeholder="Access code" autofocus>
      <button type="submit" class="gate-btn">View Document</button>
    </form>
    <div class="gate-error-msg" id="error-msg">Incorrect access code</div>
    <div class="gate-hint">Contact Sharan JM for access</div>
  </div>
</div>

document.getElementById('gate-form').addEventListener('submit', function(e) { e.preventDefault(); decrypt(); });
async function decrypt() {
  const pw = document.getElementById('pw').value;
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';
  try {
    const packed = Uint8Array.from(atob(ENCRYPTED), c => c.charCodeAt(0));
    const salt = packed.slice(0, 16);
    const iv = packed.slice(16, 28);
    const ciphertext = packed.slice(28);
    const encoder = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', encoder.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext);
    const html = new TextDecoder().decode(decrypted);
    document.open(); document.write(html); document.close();
  } catch(e) {
    document.getElementById('pw').classList.add('error');
    errEl.style.display = 'block';
    setTimeout(() => document.getElementById('pw').classList.remove('error'), 400);
  }
}
